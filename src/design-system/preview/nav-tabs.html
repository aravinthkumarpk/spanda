<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>spanda, nav tabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-page); font-family:var(--font-sans); color:var(--fg-default); }
  .tabs { display:inline-flex; align-items:center; gap:4px; background:#fff; padding:6px; border-radius:9999px; border:1px solid rgba(14,15,12,0.08); }
  .tab { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-sans); font-size:14px; font-weight:600; padding:8px 14px; border-radius:9999px; color:#0e0f0c; cursor:pointer; white-space:nowrap; }
  .tab.active { background:#9fe870; color:#0e0f0c; }
  .tab svg { width:16px; height:16px; stroke-width:2; }
  .label { font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); margin-top:12px; }
</style>
</head>
<body>
  <div class="tabs">
    <span class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>Setlist</span>
    <span class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Overview</span>
    <span class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>Queues</span>
    <span class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>Active</span>
    <span class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>ReTakes</span>
    <span class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</span>
  </div>
  <div class="label">nav-tabs · pill geometry · active = lime fill · 16px lucide icons</div>
</body>
</html>
