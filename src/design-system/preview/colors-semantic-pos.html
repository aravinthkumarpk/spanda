<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>spanda, palette: semantic positive/warning</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-page); font-family:var(--font-sans); color:var(--fg-default); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .swatch { background:var(--bg-surface); border-radius:var(--radius-lg); padding:14px; display:flex; flex-direction:column; gap:10px; }
  .chip { aspect-ratio: 5/2; border-radius:var(--radius-md); border:1px solid var(--border-faint); }
  .meta { display:flex; flex-direction:column; gap:2px; }
  .name { font-size:13px; font-weight:600; letter-spacing:-0.1px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); }
</style>
</head>
<body class="spanda-typography">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#2ead4b"></div><div class="meta"><div class="name">positive</div><div class="hex">#2ead4b</div></div></div>
    <div class="swatch"><div class="chip" style="background:#054d28"></div><div class="meta"><div class="name">positive-deep</div><div class="hex">#054d28</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ffd11a"></div><div class="meta"><div class="name">warning</div><div class="hex">#ffd11a</div></div></div>
    <div class="swatch"><div class="chip" style="background:#b86700"></div><div class="meta"><div class="name">warning-deep</div><div class="hex">#b86700</div></div></div>
  </div>
</body>
</html>
