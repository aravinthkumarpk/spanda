<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>spanda, palette: ink</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-page); font-family:var(--font-sans); color:var(--fg-default); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .swatch { background:var(--bg-surface); border-radius:var(--radius-lg); padding:14px; display:flex; flex-direction:column; gap:10px; }
  .chip { aspect-ratio: 5/2; border-radius:var(--radius-md); border:1px solid var(--border-faint); }
  .meta { display:flex; flex-direction:column; gap:2px; }
  .name { font-size:13px; font-weight:600; letter-spacing:-0.1px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); }
</style>
</head>
<body class="spanda-typography">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#0e0f0c"></div><div class="meta"><div class="name">ink</div><div class="hex">#0e0f0c</div></div></div>
    <div class="swatch"><div class="chip" style="background:#163300"></div><div class="meta"><div class="name">ink-deep</div><div class="hex">#163300</div></div></div>
    <div class="swatch"><div class="chip" style="background:#454745"></div><div class="meta"><div class="name">body</div><div class="hex">#454745</div></div></div>
    <div class="swatch"><div class="chip" style="background:#868685"></div><div class="meta"><div class="name">mute</div><div class="hex">#868685</div></div></div>
  </div>
</body>
</html>
